<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi favorito</title>
    <!-- Favicon de corazón -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/png">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <section class="hero">
        <div class="glass-card">
            <h1 class="title">Un mes a tu lado, Juan</h1>
            <p class="subtitle">05.04.2026 • 05.05.2026</p>
            <div class="heart-icon">❤️</div>
        </div>
    </section>

    <section class="content">
        <div class="message-box">
            <h2>Nuestra Historia</h2>
            <p>Desde aquel 5 de abril a las 5:00 p.m., mi mundo tiene colores más bonitos. Gracias por este primer mes lleno de momentos especiales.</p>
        </div>

        <div class="photo-placeholder">
            <!-- Aquí puedes poner una foto de ustedes dos -->
            <span>✨ Nuestra Foto Favorita ✨</span>
        </div>

        <button id="loveButton">¡Presiona aquí!</button>
        <p id="hiddenMessage" class="hidden">¡Te quiero muchísimo! ❤️</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
